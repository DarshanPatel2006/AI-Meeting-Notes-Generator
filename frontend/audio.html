<body>

  <canvas id="particles"></canvas>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-left">
      <img src="/static/images/logo.png">
    </div>

    <div class="nav-center">
      <span class="brand-name">Maniot AI</span>
    </div>

    <div class="nav-right"></div>

  <!-- MAIN CONTENT -->
  <div class="main-content">

    <div class="upload-card">

      <h2>🎤 Upload Audio</h2>
      <p>Upload your meeting audio and generate AI notes</p>

      <!-- FILE INPUT -->
      <label class="file-box">
        <input type="file" id="audioFile" accept="audio/*">
        <span id="fileText">Click to upload audio</span>
      </label>

      <!-- 🎤 RECORD BUTTON -->
<button class="btn full-btn" onclick="startRecording()">
  🎤 Start Recording
</button>

      <!-- ✅ FULL WIDTH BUTTON -->
      <button class="btn full-btn" id="generateBtn" onclick="uploadAudio()">
        <svg height="24" width="24" fill="#FFFFFF" viewBox="0 0 24 24" class="sparkle">
          <path d="M10,21.236L6.755,14.745.264,11.5L6.755,8.255L10,1.764L13.245,8.255L19.736,11.5L13.245,14.745Z">
          </path>
        </svg>
        <span class="text">Generate</span>
      </button>
      <!-- ✅ ADD HERE (VISIBLE AREA) -->
      
    </div>
    <!-- 🎤 RECORDING OVERLAY (NEW) -->
<div id="recordingOverlay" class="recording-overlay">

  <div class="recording-box">

      <!-- <div class="voiceWave"></div> -->
       <canvas id="voiceWave"></canvas>

      <h2>🎤 Recording...</h2>

      <div id="recordingTime">00:00</div>

      <div class="recording-controls">

          <button onclick="pauseRecording()">⏸ Pause</button>
          <button onclick="resumeRecording()">▶ Resume</button>
          <button onclick="stopRecording()">⏹ End</button>

      </div>

  </div>

</div>
